name: CI

on:
  push:
    branches:
      - '5.x'
      - '5.next'
      - '6.x'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testsuite:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.1'
            dependencies: 'lowest'
          - php-version: '8.4'
            dependencies: 'highest'

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl, pdo_sqlite
        ini-values: zend.assertions=1
        coverage: none

    - name: Composer install
      uses: ramsey/composer-install@v3
      with:
        dependency-versions: ${{ matrix.dependencies }}
        composer-options: ${{ matrix.composer-options }}

    - name: Composer post install
      run: composer run-script post-install-cmd --no-interaction

    - name: Run PHPUnit
      run: vendor/bin/phpunit
      env:
        DATABASE_TEST_URL: sqlite://./testdb.sqlite

  coding-standard:
    name: Coding Standard & Static Analysis
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl
        coverage: none

    - uses: ramsey/composer-install@v3

    - name: Debug PHPCS
      run: vendor/bin/phpcs --version

    - name: Run PHP CodeSniffer
      run: vendor/bin/phpcs --report=checkstyle > phpcs.xml

    - name: Annotate PR
      if: always()
      uses: staabm/annotate-pull-request-from-checkstyle@master
      with:
        checkstyle-file: phpcs.xml

    - name: Run phpstan
      if: always()
      run: vendor/bin/phpstan