<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MySQL Type Samples Search</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Select2 CSS -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<!-- noUiSlider CSS -->
<link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">

<link href="/v1/ad/css/lyaout.css" rel="stylesheet">

<!-- jQuery（Select2は必要） -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- Select2 JS -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<!-- noUiSlider JS -->
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
</head>
<body>

<header>
    <h5 class="mb-0">MySQL Type Samples 管理画面</h5>
</header>

<div class="wrapper">
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="main-content d-flex align-items-center justify-content-center" style="min-height:70vh;">

            <div class="card shadow" style="width:100%; max-width:420px;">

                <div class="card-header bg-dark text-white text-center">
                    管理画面ログイン
                </div>

                <div class="card-body p-4">

                    <div class="alert alert-danger">
                        メールアドレスまたはパスワードが違います。
                    </div>
                    
                    <form method="post" action="/login">

                        <!-- CSRF -->
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                        <!-- メールアドレス -->
                        <div class="mb-3">
                            <label class="form-label">メールアドレス</label>
                            <input type="email"
                                name="email"
                                class="form-control"
                                placeholder="example@example.com"
                                required>
                        </div>

                        <!-- パスワード -->
                        <div class="mb-3">
                            <label class="form-label">パスワード</label>
                            <input type="password"
                                name="password"
                                class="form-control"
                                required>
                        </div>

                        <!-- ログイン保持 -->
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" name="remember">
                            <label class="form-check-label">
                                ログイン状態を保持する
                            </label>
                        </div>

                        <!-- ボタン -->
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">
                                ログイン
                            </button>
                        </div>

                        <!-- パスワード再設定 -->
                        <div class="text-center">
                            <a href="/password-reset" class="text-decoration-none small">
                                パスワードをお忘れですか？
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Footer (Full Width) -->
<footer>
    © 2026 MySQL Type Samples System
</footer>

</body>
</html>
