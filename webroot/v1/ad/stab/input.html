<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MySQL Type Samples Search</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Select2 CSS -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<!-- noUiSlider CSS -->
<link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">

<link href="/v1/ad/css/lyaout.css" rel="stylesheet">

<!-- jQuery（Select2は必要） -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- Select2 JS -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<!-- noUiSlider JS -->
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
</head>
<body>

<header>
    <h5 class="mb-0">MySQL Type Samples 管理画面</h5>
</header>

<div class="wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
        <h6>メニュー</h6>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link text-white" href="#">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Search</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Settings</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header Menu -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light mb-2 rounded">
            <div class="container-fluid px-2">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">一覧</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">新規作成</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">CSVインポート</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">設定</a>
                    </li>
                </ul>
            </div>
        </nav>
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-3">
                <li class="breadcrumb-item"><a href="#">Home</a></li>
                <li class="breadcrumb-item"><a href="#">MySQL Type Samples</a></li>
                <li class="breadcrumb-item active" aria-current="page">一覧</li>
            </ol>
        </nav>
        <!-- Message Area -->
        <div class="message-area mb-3">

            <div class="alert alert-notice" onclick="this.style.display='none'">
                Notice：データを読み込みました。
            </div>

            <div class="alert alert-success-custom" onclick="this.style.display='none'">
                Success：更新が完了しました。
            </div>

            <div class="alert alert-warning-custom" onclick="this.style.display='none'">
                Warning：一部のデータが未入力です。
            </div>

            <div class="alert alert-error-custom" onclick="this.style.display='none'">
                Error：保存に失敗しました。
            </div>

        </div>

        <!-- Form Card -->
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                新規登録
            </div>

            <div class="card-body">
                <form method="post">

                    <!-- 基本情報 -->
                    <h6 class="border-bottom pb-2 mb-3">基本情報</h6>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">ID</label>
                            <input type="text" name="id" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ステータス</label>
                            <select name="status" class="form-select">
                                <option value="active">有効</option>
                                <option value="inactive">無効</option>
                                <option value="deleted">削除済み</option>
                            </select>
                        </div>
                    </div>

                    <!-- 数値系 -->
                    <h6 class="border-bottom pb-2 mb-3">数値系</h6>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label">INT<span class="text-danger">*</span></label>
                            <input type="number" name="int_col" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">BIGINT</label>
                            <input type="number" name="bigint_col" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">DECIMAL</label>
                            <input type="number" step="0.01" name="decimal_col" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">FLOAT</label>
                            <input type="number" step="0.01" name="float_col" class="form-control">
                        </div>
                    </div>

                    <!-- 日付系 -->
                    <h6 class="border-bottom pb-2 mb-3">日付系</h6>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">DATE</label>
                            <input type="date" name="date_col" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">TIME</label>
                            <input type="time" name="time_col" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">DATETIME</label>
                            <input type="datetime-local" name="datetime_col" class="form-control">
                        </div>
                    </div>

                    <!-- 文字列系 -->
                    <h6 class="border-bottom pb-2 mb-3">文字列系</h6>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">CHAR</label>
                            <input type="text" name="char_col" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">VARCHAR</label>
                            <input type="text" name="varchar_col" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">TEXT</label>
                            <textarea name="text_col" class="form-control"></textarea>
                        </div>
                    </div>

                    <!-- JSON -->
                    <h6 class="border-bottom pb-2 mb-3">JSON</h6>
                    <div class="mb-3">
                        <label class="form-label">JSONデータ</label>
                        <textarea name="json_col" class="form-control" rows="4" placeholder='{"key":"value"}'></textarea>
                    </div>

                    <!-- ボタン -->
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary px-5 me-3">確認へ</button>
                        <a href="#" class="btn btn-secondary px-5">戻る</a>
                    </div>

                </form>
            </div>
        </div>
        
    </main>
</div>

<!-- Footer (Full Width) -->
<footer>
    © 2026 MySQL Type Samples System
</footer>

</body>
</html>
