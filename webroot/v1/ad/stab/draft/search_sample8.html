<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MySQL Type Samples Search</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
html, body {
    height: 100%;
    margin: 0;
}

/* ===== Header 固定 ===== */
header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 56px;
    background: #212529;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 1000;
}

/* ===== Layout ===== */
.wrapper {
    display: flex;
    height: calc(100% - 56px);
    margin-top: 56px;
}

/* ===== Sidebar ===== */
.sidebar {
    width: 240px;
    background: #343a40;
    color: #fff;
    padding: 15px;
    overflow-y: auto;
}

/* ===== Main ===== */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 15px;
    overflow-y: auto;
}

/* ===== Search Toggle ===== */
.search-toggle {
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.search-toggle:hover {
    background-color: #f1f3f5;
}

/* ===== Table Scroll Area ===== */
.table-scroll {
    overflow: auto;
    resize: vertical;
    min-height: 70vh;
    height: 70vh; /* 初期表示高さ：画面の約70% */
    border: 1px solid #dee2e6;
}

/* ===== Sticky Table Header ===== */
.table thead th {
    position: sticky;
    top: 0;
    background: #f8f9fa;
    z-index: 2;
    border-bottom: 2px solid #dee2e6;
}

/* ===== Fixed Column Width ===== */
.table th, .table td {
    white-space: nowrap;
    min-width: 140px;
}

/* ===== Result TextBox Style ===== */
.result-input {
    border: none;
    background: transparent;
    width: 100%;
    outline: none;
}

/* ===== Footer (full width) ===== */
footer {
    width: 100%;
    background: #212529;
    color: #fff;
    text-align: center;
    padding: 12px 0;
    font-size: 0.9rem;
}
</style>
</head>
<body>

<header>
    <h5 class="mb-0">MySQL Type Samples 管理画面</h5>
</header>

<div class="wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
        <h6>メニュー</h6>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link text-white" href="#">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Search</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Settings</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Search Form -->
        <div class="card mb-3">
            <div class="card-header search-toggle" id="searchToggle">
                <span>検索条件</span>
                <span id="searchIcon">▼</span>
            </div>

            <div class="card-body" id="searchBody">
                <form method="get">

                    <div class="row mb-2">
                        <div class="col-md-3">
                            <label class="form-label">INT 完全一致</label>
                            <input type="number" name="int_col" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">BIGINT 完全一致</label>
                            <input type="number" name="bigint_col" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">DECIMAL 範囲</label>
                            <input type="number" step="0.01" name="decimal_from" class="form-control mb-1" placeholder="From">
                            <input type="number" step="0.01" name="decimal_to" class="form-control" placeholder="To">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">FLOAT 範囲</label>
                            <input type="number" step="0.01" name="float_from" class="form-control mb-1" placeholder="From">
                            <input type="number" step="0.01" name="float_to" class="form-control" placeholder="To">
                        </div>
                    </div>

                    <div class="row mb-2">
                        <div class="col-md-3">
                            <label class="form-label">DATE 範囲</label>
                            <input type="date" name="date_from" class="form-control mb-1">
                            <input type="date" name="date_to" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">TIME 範囲</label>
                            <input type="time" name="time_from" class="form-control mb-1">
                            <input type="time" name="time_to" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">DATETIME 範囲</label>
                            <input type="datetime-local" name="datetime_from" class="form-control mb-1">
                            <input type="datetime-local" name="datetime_to" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">キーワード検索</label>
                            <input type="text" name="keyword" class="form-control" placeholder="全文検索">
                        </div>
                    </div>

                    <button class="btn btn-primary">検索</button>
                    <button type="reset" class="btn btn-secondary">クリア</button>

                </form>
            </div>
        </div>
        <!-- Pagination Top -->
        <div class="d-flex justify-content-between align-items-center mb-2">
            <nav>
                <ul class="pagination mb-0">
                    <li class="page-item disabled"><a class="page-link">Prev</a></li>
                    <li class="page-item active"><a class="page-link">1</a></li>
                    <li class="page-item"><a class="page-link">2</a></li>
                    <li class="page-item"><a class="page-link">3</a></li>
                    <li class="page-item"><a class="page-link">Next</a></li>
                </ul>
            </nav>

            <div>
                <select class="form-select form-select-sm w-auto">
                    <option>10件表示</option>
                    <option>20件表示</option>
                    <option>50件表示</option>
                    <option>100件表示</option>
                </select>
            </div>
        </div>

        <!-- Result Table -->
        <div class="table-scroll mb-2">
            <table class="table table-bordered table-sm table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>INT</th>
                        <th>BIGINT</th>
                        <th>DECIMAL</th>
                        <th>FLOAT</th>
                        <th>DOUBLE</th>
                        <th>DATE</th>
                        <th>TIME</th>
                        <th>DATETIME</th>
                        <th>CHAR</th>
                        <th>VARCHAR</th>
                        <th>TEXT</th>
                        <th>MEDIUMTEXT</th>
                        <th>LONGTEXT</th>
                        <th>JSON</th>
                    </tr>
                </thead>
                <tbody>
                     <script>
                        for(let i=1;i<=50;i++){
                            document.write('<tr>');
                            document.write('<td><input class="result-input" value="uuid-'+i+'"></td>');
                            document.write('<td><input class="result-input" value="'+i+'"></td>');
                            document.write('<td><input class="result-input" value="'+(1000+i)+'"></td>');
                            document.write('<td><input class="result-input" value="12.34"></td>');
                            document.write('<td><input class="result-input" value="1.23"></td>');
                            document.write('<td><input class="result-input" value="9.87"></td>');
                            document.write('<td><input class="result-input" value="2026-02-08"></td>');
                            document.write('<td><input class="result-input" value="12:34:56"></td>');
                            document.write('<td><input class="result-input" value="2026-02-08 12:34:56"></td>');
                            document.write('<td><input class="result-input" value="CHAR'+i+'"></td>');
                            document.write('<td><input class="result-input" value="VARCHAR'+i+'"></td>');
                            document.write('<td><input class="result-input" value="TEXT'+i+'"></td>');
                            document.write('<td><input class="result-input" value="MEDIUMTEXT'+i+'"></td>');
                            document.write('<td><input class="result-input" value="LONGTEXT'+i+'"></td>');
                            document.write('<td><input class="result-input" value=\'{"a":'+i+'}\'></td>');
                            document.write('</tr>');
                        }
                    </script>

                    
                </tbody>
            </table>
        </div>

        <!-- Pagination Bottom（表示件数セレクト付き） -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <nav>
                <ul class="pagination mb-0">
                    <li class="page-item disabled"><a class="page-link">Prev</a></li>
                    <li class="page-item active"><a class="page-link">1</a></li>
                    <li class="page-item"><a class="page-link">2</a></li>
                    <li class="page-item"><a class="page-link">3</a></li>
                    <li class="page-item"><a class="page-link">Next</a></li>
                </ul>
            </nav>

            <div>
                <select class="form-select form-select-sm w-auto">
                    <option>10件表示</option>
                    <option>20件表示</option>
                    <option>50件表示</option>
                    <option>100件表示</option>
                </select>
            </div>
        </div>

    </main>
</div>

<!-- Footer (Full Width) -->
<footer>
    © 2026 MySQL Type Samples System
</footer>

<script>
document.getElementById("searchToggle").addEventListener("click", function() {
    const body = document.getElementById("searchBody");
    const icon = document.getElementById("searchIcon");

    if (body.style.display === "none") {
        body.style.display = "block";
        icon.textContent = "▼";
    } else {
        body.style.display = "none";
        icon.textContent = "▲";
    }
});
</script>

</body>
</html>
