<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MySQL Type Samples Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ===== fixed header ===== */
header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 56px;
    z-index: 1000;
    background: #212529;
    color: #fff;
    padding: 10px 20px;
}

/* body offset */
body {
    padding-top: 56px;
    background-color: #f8f9fa;
}

/* layout under header */
.layout-wrapper {
    display: flex;
    height: calc(100vh - 56px);
}

/* sidebar */
.sidebar {
    width: 240px;
    background: #343a40;
    color: #fff;
    padding: 15px;
    overflow-y: auto;
}

/* main content */
.main-content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    overflow-x: hidden;
}

/* search toggle */
.search-toggle {
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.search-toggle:hover {
    background-color: #f1f3f5;
}

/* table scroll */
.table-responsive {
    max-height: 420px;
    overflow-y: auto;
    overflow-x: auto;
}

/* sticky table header */
.result-table thead th {
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 2;
}

/* fixed column width */
.result-table th,
.result-table td {
    min-width: 160px;
    max-width: 160px;
    white-space: nowrap;
}

/* textbox display style */
.result-input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 0.9rem;
    outline: none;
}

/* pagination area */
.pagination-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>
<body>

<header>
    <div class="d-flex justify-content-between align-items-center">
        <span class="fw-bold">MySQL Type Samples</span>
        <span>管理画面</span>
    </div>
</header>

<div class="layout-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h6 class="mb-3">Menu</h6>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="#" class="nav-link text-white">Dashboard</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-white">Search</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-white">Settings</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Search Form -->
        <div class="card mb-3">
            <div class="card-header search-toggle" id="searchToggle">
                <span>検索条件</span>
                <span id="searchIcon">▼</span>
            </div>

            <div class="card-body" id="searchBody">
                <form method="get">

                    <div class="row mb-2">
                        <div class="col-md-3">
                            <label class="form-label">INT 完全一致</label>
                            <input type="number" name="int_col" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">BIGINT 完全一致</label>
                            <input type="number" name="bigint_col" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">DECIMAL 範囲</label>
                            <input type="number" step="0.01" name="decimal_from" class="form-control mb-1" placeholder="From">
                            <input type="number" step="0.01" name="decimal_to" class="form-control" placeholder="To">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">FLOAT 範囲</label>
                            <input type="number" step="0.01" name="float_from" class="form-control mb-1" placeholder="From">
                            <input type="number" step="0.01" name="float_to" class="form-control" placeholder="To">
                        </div>
                    </div>

                    <div class="row mb-2">
                        <div class="col-md-3">
                            <label class="form-label">DATE 範囲</label>
                            <input type="date" name="date_from" class="form-control mb-1">
                            <input type="date" name="date_to" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">TIME 範囲</label>
                            <input type="time" name="time_from" class="form-control mb-1">
                            <input type="time" name="time_to" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">DATETIME 範囲</label>
                            <input type="datetime-local" name="datetime_from" class="form-control mb-1">
                            <input type="datetime-local" name="datetime_to" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">キーワード検索</label>
                            <input type="text" name="keyword" class="form-control" placeholder="全文検索">
                        </div>
                    </div>

                    <button class="btn btn-primary">検索</button>
                    <button type="reset" class="btn btn-secondary">クリア</button>

                </form>
            </div>
        </div>

        <!-- Pagination Top -->
        <div class="pagination-area mb-2">
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item disabled"><a class="page-link" href="#">Prev</a></li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li>
                    <li class="page-item"><a class="page-link" href="#">Next</a></li>
                </ul>
            </nav>

            <div class="d-flex align-items-center gap-2">
                <span>表示件数</span>
                <select class="form-select form-select-sm" style="width:100px;">
                    <option>10</option>
                    <option>50</option>
                    <option>100</option>
                    <option>500</option>
                </select>
            </div>
        </div>

        <!-- Result Table -->
        <div class="card">
            <div class="card-body p-0">

                <div class="table-responsive">
                    <table class="table table-bordered table-sm result-table mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>INT</th>
                                <th>BIGINT</th>
                                <th>DECIMAL</th>
                                <th>FLOAT</th>
                                <th>DOUBLE</th>
                                <th>DATE</th>
                                <th>TIME</th>
                                <th>DATETIME</th>
                                <th>CHAR</th>
                                <th>VARCHAR</th>
                                <th>TEXT</th>
                                <th>MEDIUMTEXT</th>
                                <th>LONGTEXT</th>
                                <th>JSON</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- sample rows -->
                            <!-- 20行分 -->
                            <!-- row template -->
                            <!-- ここは本来サーバー側でループ -->
                            <script>
                                for(let i=1;i<=20;i++){
                                    document.write('<tr>');
                                    document.write('<td><input class="result-input" value="uuid-'+i+'"></td>');
                                    document.write('<td><input class="result-input" value="'+i+'"></td>');
                                    document.write('<td><input class="result-input" value="'+(1000+i)+'"></td>');
                                    document.write('<td><input class="result-input" value="12.34"></td>');
                                    document.write('<td><input class="result-input" value="1.23"></td>');
                                    document.write('<td><input class="result-input" value="9.87"></td>');
                                    document.write('<td><input class="result-input" value="2026-02-08"></td>');
                                    document.write('<td><input class="result-input" value="12:34:56"></td>');
                                    document.write('<td><input class="result-input" value="2026-02-08 12:34:56"></td>');
                                    document.write('<td><input class="result-input" value="CHAR'+i+'"></td>');
                                    document.write('<td><input class="result-input" value="VARCHAR'+i+'"></td>');
                                    document.write('<td><input class="result-input" value="TEXT'+i+'"></td>');
                                    document.write('<td><input class="result-input" value="MEDIUMTEXT'+i+'"></td>');
                                    document.write('<td><input class="result-input" value="LONGTEXT'+i+'"></td>');
                                    document.write('<td><input class="result-input" value=\'{"a":'+i+'}\'></td>');
                                    document.write('</tr>');
                                }
                            </script>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

        <!-- Pagination Bottom -->
        <div class="pagination-area mt-2">
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item disabled"><a class="page-link" href="#">Prev</a></li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li>
                    <li class="page-item"><a class="page-link" href="#">Next</a></li>
                </ul>
            </nav>
        </div>

    </main>

</div>

<!-- JS -->
<script>
document.getElementById("searchToggle").addEventListener("click", function() {
    const body = document.getElementById("searchBody");
    const icon = document.getElementById("searchIcon");

    if (body.style.display === "none") {
        body.style.display = "block";
        icon.textContent = "▼";
    } else {
        body.style.display = "none";
        icon.textContent = "▲";
    }
});
</script>

</body>
</html>
