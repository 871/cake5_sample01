<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MySQL Type Samples Search</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Select2 CSS -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<!-- noUiSlider CSS -->
<link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">

<link href="/v1/ad/css/lyaout.css" rel="stylesheet">

<!-- jQuery（Select2は必要） -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- Select2 JS -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<!-- noUiSlider JS -->
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
</head>
<body>

<header>
    <h5 class="mb-0">MySQL Type Samples 管理画面</h5>
</header>

<div class="wrapper">
    
    <!-- Main Content -->
    <main class="main-content">
        
        <main class="main-content d-flex align-items-center justify-content-center" style="min-height:70vh;">

            <div class="card shadow border-danger" style="width:100%; max-width:600px;">

                <div class="card-header bg-danger text-white text-center">
                    エラーが発生しました
                </div>

                <div class="card-body p-4 text-center">

                    <!-- エラーコード（必要なら） -->
                    <h1 class="display-6 text-danger mb-3">
                        500
                    </h1>

                    <!-- エラーメッセージ -->
                    <p class="mb-4">
                        申し訳ありません。<br>
                        システムエラーが発生しました。<br>
                        しばらくしてから再度お試しください。
                    </p>

                    <!-- ボタン -->
                    <div class="d-flex justify-content-center gap-3">
                        <a href="/dashboard" class="btn btn-primary">
                            ダッシュボードへ
                        </a>

                        <button onclick="history.back()" class="btn btn-outline-secondary">
                            前の画面へ戻る
                        </button>
                    </div>

                </div>

                <div class="card-footer text-center small text-muted">
                    Error Code: SYSTEM_EXCEPTION
                </div>

            </div>

        </main>
        
    </main>
</div>

<!-- Footer (Full Width) -->
<footer>
    © 2026 MySQL Type Samples System
</footer>

</body>
</html>
